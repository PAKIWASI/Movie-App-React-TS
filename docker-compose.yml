services:

  backend:
    build:
      context: ./backend       # folder containing backend.Dockerfile
      dockerfile: backend.Dockerfile
    restart: unless-stopped
    environment:
      PORT:        5000
      NODE_ENV:    production
      MONGO_URI:   ${MONGO_URI}
      JWT_SECRET:  ${JWT_SECRET}                   # comes from .env file at compose root
      CLIENT_URL:  http://localhost                # nginx serves frontend on port 80
    ports:
      - "5000:5000"            # expose backend so nginx can proxy to it (or for direct API access)
    networks:
      - internal
      - external

  frontend:
    build:
      context: ./frontend      # folder containing frontend.Dockerfile + nginx.conf
      dockerfile: frontend.Dockerfile
      args:
        # Baked into the JS bundle at build time.
        # Points to the backend — in production replace localhost with your domain.
        VITE_API_URL: http://localhost:5000
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - external

networks:
  internal:   # mongo ↔ backend (not exposed)
  external:   # backend ↔ frontend ↔ outside world
