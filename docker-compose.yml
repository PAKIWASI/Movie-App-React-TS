services:

  backend:
    build:
      # in what directory to look for dockerfile (backend dir)
      context: ./backend       # folder containing backend.Dockerfile
      #dockerfile: Dockerfile
    restart: unless-stopped   # If the container crashes, Docker restarts it automatically.
    # requires a .env at same level as this file
    environment:
      PORT:        ${PORT}
      NODE_ENV:    ${NODE_ENV}
      MONGO_URI:   ${MONGO_URI}
      JWT_SECRET:  ${JWT_SECRET}
      CLIENT_URL:  http://localhost   # nginx serves the frontend on port 80 of the same host, 
                                      # so from the backend's perspective the frontend origin is http://localhost

    # exposes the backend to the outside world (and to nginx for proxying).
    ports:
      - "5000:5000"   # container's 5000 is mapped to device's 5000
    networks:
      - external      # for talking to the frontend/nginx. 

  frontend:
    build:
      context: ./frontend      # folder containing frontend.Dockerfile + nginx.conf
      # dockerfile: frontend.Dockerfile
      args:
        # Baked into the JS bundle at build time.
        # Points to the backend — in production replace localhost with your domain.
        VITE_API_URL: http://localhost:5000
    restart: unless-stopped
    depends_on:
      - backend
    ports:        # nginx inside the frontend container listens on 80 and serves the static files.
      - "80:80"
    networks:
      - external

networks:
  external:   # backend ↔ frontend ↔ outside world
