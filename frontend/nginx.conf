server {
    listen 80;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        # Without this, refreshing on /movie/123 returns 404.
        # try_files serves the file if it exists, otherwise falls back to index.html
        # and lets React Router handle the path.
        try_files $uri $uri/ /index.html;
    }
}
